<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standards Pick & Pack — Rexel CLR Champigneulles</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0A1628;
  --navy-mid: #111D35;
  --navy-light: #162242;
  --teal: #0D8B8B;
  --teal-glow: #0FB5B5;
  --cyan: #00E5FF;
  --white: #F0F4F8;
  --muted: #8A9BB5;
  --red: #CC0000;
  --orange: #D4841A;
  --green: #17B978;
  --gold: #FFD700;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--navy);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 50%, var(--navy) 100%);
  border-bottom: 2px solid var(--teal);
  padding: 20px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 30px rgba(0,229,255,0.1);
}

.header h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--cyan);
  text-transform: uppercase;
}

.header .subtitle {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 1px;
}

/* ─── NAV TABS ─── */
.nav-tabs {
  display: flex;
  justify-content: center;
  gap: 0;
  background: var(--navy-mid);
  border-bottom: 1px solid rgba(0,229,255,0.15);
}

.nav-tab {
  flex: 1;
  max-width: 200px;
  padding: 14px 8px;
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.3s;
  text-transform: uppercase;
}

.nav-tab:hover { color: var(--teal-glow); }

.nav-tab.active {
  color: var(--cyan);
  border-bottom-color: var(--cyan);
  background: rgba(0,229,255,0.05);
}

/* ─── STANDARD LIST ─── */
.view { display: none; }
.view.active { display: block; }

.std-list {
  padding: 16px;
  max-width: 800px;
  margin: 0 auto;
}

.std-card {
  background: var(--navy-mid);
  border: 1px solid rgba(0,229,255,0.1);
  border-left: 4px solid var(--teal);
  border-radius: 8px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.25s;
  overflow: hidden;
}

.std-card:hover {
  border-left-color: var(--cyan);
  background: var(--navy-light);
  transform: translateX(4px);
  box-shadow: 0 4px 20px rgba(0,229,255,0.08);
}

.std-card-header {
  display: flex;
  align-items: center;
  padding: 16px;
  gap: 14px;
}

.std-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 500;
  background: var(--teal);
  color: var(--navy);
  padding: 4px 10px;
  border-radius: 4px;
  white-space: nowrap;
  min-width: 38px;
  text-align: center;
}

.std-title {
  font-size: 1rem;
  font-weight: 600;
  flex: 1;
}

.std-arrow {
  color: var(--muted);
  font-size: 1.2rem;
  transition: transform 0.3s;
}

.std-card.open .std-arrow { transform: rotate(90deg); color: var(--cyan); }

.std-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.std-card.open .std-content {
  max-height: 5000px;
}

.std-body {
  padding: 0 16px 20px 16px;
}

.std-section {
  margin-bottom: 16px;
}

.std-section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 2px;
  color: var(--teal-glow);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(13,139,139,0.3);
  text-transform: uppercase;
}

.std-steps {
  list-style: none;
  counter-reset: step;
}

.std-steps li {
  counter-increment: step;
  padding: 8px 0 8px 36px;
  position: relative;
  font-size: 0.95rem;
  line-height: 1.5;
  color: rgba(240,244,248,0.9);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.std-steps li::before {
  content: counter(step);
  position: absolute;
  left: 0;
  top: 8px;
  width: 24px;
  height: 24px;
  background: var(--teal);
  color: var(--navy);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 700;
}

.interdit-box {
  background: rgba(204,0,0,0.12);
  border: 1px solid rgba(204,0,0,0.4);
  border-radius: 6px;
  padding: 12px 14px;
  margin-top: 4px;
}

.interdit-box .interdit-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.68rem;
  color: var(--red);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.interdit-box ul {
  list-style: none;
  padding: 0;
}

.interdit-box li {
  padding: 4px 0 4px 20px;
  position: relative;
  font-size: 0.9rem;
  color: rgba(240,244,248,0.85);
}

.interdit-box li::before {
  content: "✕";
  position: absolute;
  left: 0;
  color: var(--red);
  font-weight: 700;
}

.risk-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}

.risk-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

.risk-critical { background: rgba(204,0,0,0.2); border: 1px solid var(--red); color: #ff6666; }
.risk-major { background: rgba(212,132,26,0.15); border: 1px solid var(--orange); color: #f0a040; }

.motto {
  font-style: italic;
  font-size: 0.88rem;
  color: var(--teal-glow);
  padding: 12px 0 0 0;
  border-top: 1px solid rgba(13,139,139,0.2);
  text-align: center;
}

/* ─── QUIZ ─── */
.quiz-container {
  padding: 16px;
  max-width: 800px;
  margin: 0 auto;
}

.quiz-progress {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.quiz-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--navy-light);
  border-radius: 3px;
  overflow: hidden;
}

.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--cyan));
  border-radius: 3px;
  transition: width 0.4s ease;
}

.quiz-progress-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
}

.quiz-card {
  background: var(--navy-mid);
  border: 1px solid rgba(0,229,255,0.12);
  border-radius: 10px;
  padding: 24px 20px;
  margin-bottom: 16px;
}

.quiz-std-ref {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--teal);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.quiz-question {
  font-size: 1.1rem;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 20px;
}

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.quiz-option {
  background: var(--navy-light);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.25s;
  font-size: 0.95rem;
  line-height: 1.4;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.quiz-option:hover:not(.disabled) {
  border-color: var(--teal);
  background: rgba(13,139,139,0.08);
}

.quiz-option .opt-letter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  min-width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  color: var(--muted);
  flex-shrink: 0;
}

.quiz-option.correct {
  border-color: var(--green);
  background: rgba(23,185,120,0.12);
}

.quiz-option.correct .opt-letter {
  background: var(--green);
  color: var(--navy);
}

.quiz-option.wrong {
  border-color: var(--red);
  background: rgba(204,0,0,0.1);
}

.quiz-option.wrong .opt-letter {
  background: var(--red);
  color: white;
}

.quiz-option.disabled { cursor: default; opacity: 0.7; }
.quiz-option.disabled.correct { opacity: 1; }
.quiz-option.disabled.wrong { opacity: 1; }

.quiz-explanation {
  margin-top: 16px;
  padding: 14px;
  background: rgba(13,139,139,0.08);
  border-left: 3px solid var(--teal);
  border-radius: 0 6px 6px 0;
  font-size: 0.9rem;
  color: rgba(240,244,248,0.85);
  line-height: 1.5;
  display: none;
}

.quiz-explanation.show { display: block; animation: fadeIn 0.3s; }

.quiz-nav {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 2px;
  padding: 12px 32px;
  border: 2px solid var(--teal);
  background: transparent;
  color: var(--cyan);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
}

.btn:hover {
  background: var(--teal);
  color: var(--navy);
}

.btn:disabled {
  opacity: 0.3;
  cursor: default;
}

/* ─── RESULTS ─── */
.quiz-results {
  text-align: center;
  padding: 40px 20px;
}

.results-score {
  font-family: 'Orbitron', sans-serif;
  font-size: 3.5rem;
  font-weight: 900;
  margin: 16px 0;
}

.results-score.excellent { color: var(--green); }
.results-score.good { color: var(--cyan); }
.results-score.avg { color: var(--orange); }
.results-score.poor { color: var(--red); }

.results-label {
  font-size: 1.2rem;
  color: var(--muted);
  margin-bottom: 8px;
}

.results-message {
  font-size: 1.1rem;
  margin: 16px 0 28px;
  line-height: 1.6;
}

.results-breakdown {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.breakdown-item {
  text-align: center;
}

.breakdown-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
}

.breakdown-label {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 1px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── FOOTER ─── */
.footer {
  text-align: center;
  padding: 24px 16px;
  font-size: 0.72rem;
  color: rgba(138,155,181,0.5);
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div class="header">
  <h1>Standards Pick & Pack</h1>
  <div class="subtitle">CLR Champigneulles — Rexel France</div>
</div>

<div class="nav-tabs">

<div id="view-quiz" class="view">

</div>

<div class="footer">STD-PP — Pick & Pack — Usage interne — 2026</div>

// RENDER STANDARDS
// ═══════════════════════════════════════
function renderStandards() {
  const container = document.getElementById('std-list');
  container.innerHTML = standards.map((s, i) => `
    <div class="std-card" onclick="toggleCard(this)">
      <div class="std-card-header">
        <span class="std-badge">${s.id}</span>
        <span class="std-title">${s.title}</span>
        <span class="std-arrow">›</span>
      </div>
      <div class="std-content">
        <div class="std-body">
          <div class="std-section">
            <div class="std-section-title">Gestes obligatoires</div>
            <ol class="std-steps">
              ${s.steps.map(st => `<li>${st}</li>`).join('')}
            </ol>
          </div>
          <div class="std-section">
            <div class="interdit-box">
              <div class="interdit-title">INTERDITS</div>
              <ul>${s.interdits.map(it => `<li>${it}</li>`).join('')}</ul>
            </div>
          </div>
          <div class="std-section">
            <div class="std-section-title">Risques</div>
            <div class="risk-tags">
              ${s.risks.map(r => `<span class="risk-tag risk-${r.level}">${r.label}</span>`).join('')}
            </div>
          </div>
          <div class="motto">« ${s.motto} »</div>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleCard(card) {
  card.classList.toggle('open');
}

// ═══════════════════════════════════════
// QUIZ ENGINE
// ═══════════════════════════════════════
let currentQ = 0;
let score = 0;
let answered = new Array(quizData.length).fill(false);
let userAnswers = new Array(quizData.length).fill(-1);

function renderQuiz() {
  const container = document.getElementById('quiz-container');
  
  if (currentQ >= quizData.length) {
    renderResults();
    return;
  }

  const q = quizData[currentQ];
  const pct = ((currentQ) / quizData.length * 100).toFixed(0);
  const letters = ['A', 'B', 'C', 'D'];
  
  container.innerHTML = `
    <div class="quiz-progress">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      <div class="quiz-progress-text">${currentQ + 1}/${quizData.length}</div>
    </div>
    <div class="quiz-card">
      <div class="quiz-std-ref">STANDARD ${q.std}</div>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">
        ${q.options.map((opt, i) => `
          <div class="quiz-option ${answered[currentQ] ? 'disabled' : ''} ${answered[currentQ] && i === q.correct ? 'correct' : ''} ${answered[currentQ] && userAnswers[currentQ] === i && i !== q.correct ? 'wrong' : ''}" 
               onclick="selectAnswer(${i})">
            <span class="opt-letter">${letters[i]}</span>
            <span>${opt}</span>
          </div>
        `).join('')}
      </div>
      <div class="quiz-explanation ${answered[currentQ] ? 'show' : ''}" id="explanation">
        ${q.explanation}
      </div>
    </div>
    <div class="quiz-nav">
      ${answered[currentQ] ? `<button class="btn" onclick="nextQuestion()">${currentQ < quizData.length - 1 ? 'Question suivante ▸' : 'Voir le résultat ▸'}</button>` : ''}
    </div>
  `;
}

function selectAnswer(idx) {
  if (answered[currentQ]) return;
  answered[currentQ] = true;
  userAnswers[currentQ] = idx;
  if (idx === quizData[currentQ].correct) score++;
  renderQuiz();
}

function nextQuestion() {
  currentQ++;
  renderQuiz();
}

function renderResults() {
  const container = document.getElementById('quiz-container');
  const pct = Math.round(score / quizData.length * 100);
  let cls = 'poor', msg = '';
  if (pct >= 85) { cls = 'excellent'; msg = 'Excellent ! Tu maîtrises les standards. Continue comme ça.'; }
  else if (pct >= 70) { cls = 'good'; msg = 'Bon niveau. Quelques standards à revoir pour être au top.'; }
  else if (pct >= 50) { cls = 'avg'; msg = 'Des bases, mais il faut renforcer ta connaissance des standards.'; }
  else { msg = 'Il est important de revoir les standards en profondeur. Demande une formation.'; }

  container.innerHTML = `
    <div class="quiz-results">
      <div class="results-label">TON SCORE</div>
      <div class="results-score ${cls}">${pct}%</div>
      <div class="results-breakdown">
        <div class="breakdown-item">
          <div class="breakdown-num" style="color:var(--green)">${score}</div>
          <div class="breakdown-label">CORRECT${score > 1 ? 'ES' : 'E'}</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-num" style="color:var(--red)">${quizData.length - score}</div>
          <div class="breakdown-label">ERREUR${quizData.length - score > 1 ? 'S' : ''}</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-num" style="color:var(--cyan)">${quizData.length}</div>
          <div class="breakdown-label">QUESTIONS</div>
        </div>
      </div>
      <div class="results-message">${msg}</div>
      <button class="btn" onclick="resetQuiz()">Recommencer le quiz</button>
    </div>
  `;
}

function resetQuiz() {
  currentQ = 0;
  score = 0;
  answered = new Array(quizData.length).fill(false);
  userAnswers = new Array(quizData.length).fill(-1);
  renderQuiz();
}

// ═══════════════════════════════════════
// NAV
// ═══════════════════════════════════════
function switchView(view) {
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    t.classList.toggle('active', (view === 'standards' && i === 0) || (view === 'quiz' && i === 1));
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  if (view === 'quiz') renderQuiz();
}

// INIT
renderStandards();
